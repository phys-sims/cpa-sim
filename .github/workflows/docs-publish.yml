name: docs-nightly-publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r docs/requirements.txt

      - name: Install optional gnlse backend
        run: |
          # gnlse currently imports pkg_resources at build time in CI;
          # pin setuptools to avoid breakages from newer releases.
          pip install "setuptools<81"
          pip install -e .[gnlse]

      - name: Generate docs assets (scheduled/manual)
        run: |
          # Remove tracked SVG outputs first so this workflow validates
          # generation in the current run rather than repository checkout state.
          rm -rf docs/assets/generated/wave-breaking-raman
          python scripts/build_docs_assets.py --mode ci

      - name: Verify generated wave-breaking Raman assets
        run: |
          expected_files=(
            "docs/assets/generated/wave-breaking-raman/spectrum_z0_vs_zL.svg"
            "docs/assets/generated/wave-breaking-raman/evolution_wavelength_vs_distance.svg"
            "docs/assets/generated/wave-breaking-raman/evolution_delay_vs_distance.svg"
          )

          missing=0
          for file in "${expected_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing expected generated asset: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "One or more generated dispersive-wave SVG assets are missing."
            exit 1
          fi

      - name: Build docs
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
