name: docs-nightly-publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r docs/requirements.txt

      - name: Install optional gnlse backend
        run: |
          # gnlse currently imports pkg_resources at build time in CI;
          # pin setuptools to avoid breakages from newer releases.
          pip install "setuptools<81"
          pip install -e .[gnlse]

      - name: Generate docs assets (scheduled/manual)
        run: python scripts/build_docs_assets.py --mode ci

      - name: Build docs
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
