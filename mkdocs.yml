  - Validation:
      - AutoWindow: validation/auto_window.md
  - Roadmaps:
      - v1 to v3 Plan: roadmaps/v1_to_v3_plan.md
      - v1 Fiber Stage Roadmap: roadmaps/v1-fiber-stage-roadmap.md
      - v1 Free Space Stage Roadmap: roadmaps/v1-freespace-stage-roadmap.md
