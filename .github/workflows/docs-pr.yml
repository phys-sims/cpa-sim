name: docs-pr-check

on:
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r docs/requirements.txt

      - name: Generate docs assets (PR-safe)
        run: python scripts/build_docs_assets.py --mode ultra-fast --allow-missing-gnlse

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload site artifact (PR)
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
