site_name: cpa-sim
site_description: Documentation for the cpa-sim chirped-pulse amplification simulator
repo_url: https://github.com/phys-sims/cpa-sim
edit_uri: ""

theme:
  name: material

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Examples:
      - Simple Fiber Dispersion: examples/simple-fiber-dispersion.md
      - Wave Breaking Raman: examples/wave-breaking-raman.md
      - Fiber Amp SPM: examples/fiber-amp-spm.md
      - Treacy Stage Validation: examples/treacy-stage-validation.md
      - End-to-End 1560nm: examples/end-to-end-1560nm.md
  - Configuration:
      - Pulse Spec: config/pulse_spec.md
  - ADRs:
      - Index: adr/INDEX.md
      - ADR-0001 Conventions & Units: adr/ADR-0001-conventions-units.md
      - ADR-0002 Result Schema Contract: adr/ADR-0002-result-schema-contract.md
      - ADR-0003 Validation Tiers CI Policy: adr/ADR-0003-validation-tiers-ci-policy.md
      - ADR-0004 Stage Domain Boundaries: adr/ADR-0004-stage-domain-boundaries.md
      - ADR-0005 phys-pipeline Contract Adoption: adr/ADR-0005-phys-pipeline-contract-adoption.md
      - ADR-0006 Fiber Stage Physics Numerics Split: adr/ADR-0006-fiber-stage-physics-numerics-split.md
      - ADR-0008 Canonical Output Layout: adr/ADR-0008-canonical-output-layout.md
      - ADR Template (Lite): adr/_template-lite.md
      - ADR Template (Full): adr/_template-full.md
      - ADR Template (Amend): adr/_template-amend.md
  - Agent Context:
      - Fiber Stage: agent/fiber-stage-context.md
      - Fiber Amp Wrap: agent/fiber_amp_wrap-context.md
      - Free Space Treacy: agent/freespace-stage-treacy-context.md
