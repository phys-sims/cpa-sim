name: docs

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r docs/requirements.txt

      - name: Install optional gnlse backend (scheduled/manual)
        if: github.event_name != 'pull_request'
        run: pip install -e .[gnlse]

      - name: Generate docs assets (PR-safe)
        if: github.event_name == 'pull_request'
        run: python scripts/build_docs_assets.py --mode ultra-fast --allow-missing-gnlse

      - name: Generate docs assets (scheduled/manual)
        if: github.event_name != 'pull_request'
        run: python scripts/build_docs_assets.py --mode ci

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload site artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4
